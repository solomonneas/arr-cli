name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify script is executable
        run: test -x media

      - name: Run help command
        run: bash media help

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'media'
          severity: 'warning'

# npm publishing is intentionally manual (`npm publish --access public` from
# a local checkout). A prior CI auto-publish-on-tag job caused double-publish
# races with manual releases and wasted a version number; leaving this to
# humans is simpler until the repo has more than one maintainer.
